<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaga Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            position: relative;
            border: 4px solid #0f0;
            border-radius: 8px;
            box-shadow: 0 0 20px #0f0, 0 0 40px #0f03, inset 0 0 60px #0f02;
        }
        #gameCanvas {
            display: block;
            border-radius: 4px;
        }
        #crtOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <canvas id="crtOverlay"></canvas>
    </div>

    <script>
    // ============================================
    // GALAGA CLONE - Complete HTML5 Canvas Game
    // ============================================

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const crtOverlay = document.getElementById('crtOverlay');
    const crtCtx = crtOverlay.getContext('2d');

    // Game dimensions
    const WIDTH = 480;
    const HEIGHT = 640;
    canvas.width = WIDTH;
    canvas.height = HEIGHT;
    crtOverlay.width = WIDTH;
    crtOverlay.height = HEIGHT;

    // Game states
    const STATE = {
        START_SCREEN: 'START_SCREEN',
        PLAYING: 'PLAYING',
        WAVE_CLEAR: 'WAVE_CLEAR',
        GAME_OVER: 'GAME_OVER'
    };

    // Colors
    const COLORS = {
        neonGreen: '#0f0',
        neonGreenDim: '#0a0',
        cyan: '#0ff',
        magenta: '#f0f',
        yellow: '#ff0',
        red: '#f33',
        white: '#fff',
        bgDark: '#000'
    };

    // Game variables
    let gameState = STATE.START_SCREEN;
    let score = 0;
    let highScore = 0;
    let lives = 3;
    let wave = 1;
    let enemies = [];
    let playerBullets = [];
    let enemyBullets = [];
    let particles = [];
    let stars = [];
    let screenShake = 0;
    let waveTimer = 0;
    let gameTime = 0;

    // Input state
    const keys = {};

    // Player object
    const player = {
        x: WIDTH / 2,
        y: HEIGHT - 60,
        width: 32,
        height: 24,
        speed: 5,
        shootCooldown: 0,
        invincible: 0,
        visible: true
    };

    // ============================================
    // STAR FIELD
    // ============================================
    function initStars() {
        stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * WIDTH,
                y: Math.random() * HEIGHT,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 2 + 0.5,
                brightness: Math.random() * 0.5 + 0.5
            });
        }
    }

    function updateStars() {
        for (let star of stars) {
            star.y += star.speed;
            if (star.y > HEIGHT) {
                star.y = 0;
                star.x = Math.random() * WIDTH;
            }
        }
    }

    function drawStars() {
        for (let star of stars) {
            ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
            ctx.fillRect(star.x, star.y, star.size, star.size);
        }
    }

    // ============================================
    // PLAYER SHIP
    // ============================================
    function drawPlayer() {
        if (!player.visible) return;
        
        const x = player.x;
        const y = player.y;
        const w = player.width;
        const h = player.height;

        ctx.save();
        
        // Flicker when invincible
        if (player.invincible > 0 && Math.floor(gameTime * 10) % 2 === 0) {
            ctx.globalAlpha = 0.5;
        }

        // Main body
        ctx.fillStyle = COLORS.cyan;
        ctx.beginPath();
        ctx.moveTo(x, y - h/2);
        ctx.lineTo(x - w/2, y + h/2);
        ctx.lineTo(x - w/4, y + h/4);
        ctx.lineTo(x, y + h/2);
        ctx.lineTo(x + w/4, y + h/4);
        ctx.lineTo(x + w/2, y + h/2);
        ctx.closePath();
        ctx.fill();

        // Cockpit
        ctx.fillStyle = COLORS.neonGreen;
        ctx.fillRect(x - 4, y - 4, 8, 8);

        // Wings detail
        ctx.fillStyle = COLORS.neonGreenDim;
        ctx.fillRect(x - w/2 + 2, y + h/4, 6, 4);
        ctx.fillRect(x + w/2 - 8, y + h/4, 6, 4);

        // Engine glow
        ctx.fillStyle = COLORS.yellow;
        ctx.fillRect(x - 6, y + h/2 - 4, 4, 4);
        ctx.fillRect(x + 2, y + h/2 - 4, 4, 4);

        ctx.restore();
    }

    function updatePlayer() {
        // Movement
        if (keys['ArrowLeft'] || keys['KeyA']) {
            player.x -= player.speed;
        }
        if (keys['ArrowRight'] || keys['KeyD']) {
            player.x += player.speed;
        }

        // Clamp position
        player.x = Math.max(player.width/2, Math.min(WIDTH - player.width/2, player.x));

        // Shooting
        if (player.shootCooldown > 0) player.shootCooldown--;
        if (keys['Space'] && player.shootCooldown <= 0) {
            shootBullet();
            player.shootCooldown = 10;
        }

        // Invincibility timer
        if (player.invincible > 0) player.invincible--;
    }

    function shootBullet() {
        playerBullets.push({
            x: player.x,
            y: player.y - player.height/2,
            width: 4,
            height: 12,
            speed: 10
        });
    }

    // ============================================
    // ENEMIES
    // ============================================
    const ENEMY_TYPES = {
        BEE: {
            name: 'BEE',
            width: 24,
            height: 20,
            speed: 3,
            health: 1,
            score: 100,
            color: COLORS.yellow,
            formationOffset: 0
        },
        BUTTERFLY: {
            name: 'BUTTERFLY',
            width: 28,
            height: 24,
            speed: 2,
            health: 2,
            score: 150,
            color: COLORS.magenta,
            formationOffset: 1
        }
    };

    function createEnemy(type, formationX, formationY) {
        const config = ENEMY_TYPES[type];
        return {
            type: type,
            x: formationX,
            y: formationY,
            targetX: formationX,
            targetY: formationY,
            width: config.width,
            height: config.height,
            speed: config.speed,
            health: config.health,
            maxHealth: config.health,
            score: config.score,
            color: config.color,
            state: 'ENTERING', // ENTERING, FORMATION, ATTACKING, RETURNING
            attackPhase: 0,
            attackTimer: 0,
            swoopAngle: 0,
            originalFormationX: formationX,
            originalFormationY: formationY,
            shootCooldown: Math.random() * 200 + 100
        };
    }

    function spawnWave() {
        enemies = [];
        const beeCount = 8 + wave * 2;
        const butterflyCount = 4 + wave;

        // Formation layout - classic Galaga style
        const rows = 4;
        const cols = 8;

        // Spawn butterflies in front rows
        let butterflyIndex = 0;
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                if (row < 2 && butterflyIndex < butterflyCount) {
                    const x = 60 + col * 48;
                    const y = -50 - row * 40;
                    enemies.push(createEnemy('BUTTERFLY', x, y));
                    enemies[enemies.length - 1].formationX = x;
                    enemies[enemies.length - 1].formationY = y;
                    butterflyIndex++;
                }
            }
        }

        // Spawn bees in back rows
        let beeIndex = 0;
        for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
                const isFrontRow = row < 2;
                if (!isFrontRow && beeIndex < beeCount) {
                    const x = 60 + col * 48;
                    const y = -50 - row * 40;
                    enemies.push(createEnemy('BEE', x, y));
                    enemies[enemies.length - 1].formationX = x;
                    enemies[enemies.length - 1].formationY = y;
                    beeIndex++;
                }
            }
        }
    }

    function updateEnemies() {
        for (let enemy of enemies) {
            enemy.attackTimer++;

            if (enemy.state === 'ENTERING') {
                // Move to formation position
                const targetY = enemy.originalFormationY;
                enemy.y += 2;
                enemy.x += (enemy.formationX - enemy.x) * 0.03;
                
                if (enemy.y >= targetY - 60) {
                    enemy.state = 'FORMED';
                    enemy.y = targetY - 60;
                }
            } 
            else if (enemy.state === 'FORMED') {
                // Slowly move to formation position
                enemy.x += (enemy.originalFormationX - enemy.x) * 0.05;
                enemy.y += (enemy.originalFormationY - enemy.y) * 0.05;

                // Occasionally send bees to attack
                if (enemy.attackTimer > 150 - wave * 10 && enemy.type === 'BEE') {
                    if (Math.random() < 0.005 * wave) {
                        enemy.state = 'ATTACKING';
                        enemy.attackPhase = 0;
                        enemy.attackTimer = 0;
                        enemy.swoopAngle = Math.random() * Math.PI * 2;
                    }
                }
                if (enemy.attackTimer > 200 - wave * 10 && enemy.type === 'BUTTERFLY') {
                    if (Math.random() < 0.003 * wave) {
                        enemy.state = 'ATTACKING';
                        enemy.attackPhase = 0;
                        enemy.attackTimer = 0;
                    }
                }
            }
            else if (enemy.state === 'ATTACKING') {
                enemy.attackPhase++;

                if (enemy.type === 'BEE') {
                    // Erratic swooping
                    enemy.swoopAngle += 0.08;
                    enemy.x += Math.cos(enemy.swoopAngle) * enemy.speed * 1.5;
                    enemy.y += 2 + Math.sin(enemy.swoopAngle * 2) * 2;
                    
                    // Shoot occasionally
                    if (enemy.attackPhase % 60 === 0 && Math.random() < 0.5 * wave) {
                        enemyShoot(enemy);
                    }
                } else {
                    // Butterfly curved attack
                    if (enemy.attackPhase < 60) {
                        enemy.x += Math.sin(enemy.attackPhase * 0.1) * 3;
                        enemy.y += 1.5;
                    } else if (enemy.attackPhase < 120) {
                        enemy.y += 3;
                        enemy.x += Math.cos(enemy.attackTimer * 0.05) * 2;
                    } else {
                        // Dive toward player
                        const dx = player.x - enemy.x;
                        enemy.x += dx * 0.03;
                        enemy.y += 4;

                        if (enemy.attackPhase % 20 === 0) {
                            enemyShoot(enemy);
                        }
                    }
                }

                // Return to formation or go to bottom
                if (enemy.y > HEIGHT + 50) {
                    enemy.state = 'RETURNING';
                    enemy.attackTimer = 0;
                }
            }
            else if (enemy.state === 'RETURNING') {
                // Return to formation position
                const speed = 5 + wave * 0.5;
                enemy.x += (enemy.originalFormationX - enemy.x) * 0.08;
                enemy.y += (enemy.originalFormationY - enemy.y) * 0.08;
                
                if (Math.abs(enemy.y - enemy.originalFormationY) < 5) {
                    enemy.state = 'FORMED';
                    enemy.y = enemy.originalFormationY;
                }
            }

            // Keep in bounds horizontally
            if (enemy.x < 20) enemy.x = 20;
            if (enemy.x > WIDTH - 20) enemy.x = WIDTH - 20;
        }
    }

    function enemyShoot(enemy) {
        enemyBullets.push({
            x: enemy.x,
            y: enemy.y + enemy.height/2,
            width: 4,
            height: 8,
            speed: 4 + wave * 0.3,
            isEnemy: true
        });
    }

    function drawEnemy(enemy) {
        const x = enemy.x;
        const y = enemy.y;
        const w = enemy.width;
        const h = enemy.height;

        ctx.fillStyle = enemy.color;

        if (enemy.type === 'BEE') {
            // Bee - angular, aggressive shape
            ctx.beginPath();
            ctx.moveTo(x, y - h/2);
            ctx.lineTo(x - w/2, y);
            ctx.lineTo(x - w/3, y + h/2);
            ctx.lineTo(x + w/3, y + h/2);
            ctx.lineTo(x + w/2, y);
            ctx.closePath();
            ctx.fill();

            // Eyes
            ctx.fillStyle = COLORS.red;
            ctx.fillRect(x - 6, y - 4, 4, 4);
            ctx.fillRect(x + 2, y - 4, 4, 4);

            // Stripes
            ctx.fillStyle = COLORS.neonGreenDim;
            ctx.fillRect(x - w/3, y + 2, w/1.5, 3);
        } else {
            // Butterfly - wider, curved shape
            ctx.beginPath();
            ctx.moveTo(x, y - h/2);
            ctx.lineTo(x - w/2, y - h/4);
            ctx.lineTo(x - w/2, y + h/3);
            ctx.lineTo(x - w/4, y + h/2);
            ctx.lineTo(x, y + h/4);
            ctx.lineTo(x + w/4, y + h/2);
            ctx.lineTo(x + w/2, y + h/3);
            ctx.lineTo(x + w/2, y - h/4);
            ctx.closePath();
            ctx.fill();

            // Wing patterns
            ctx.fillStyle = COLORS.cyan;
            ctx.fillRect(x - w/3, y - h/4, 4, 6);
            ctx.fillRect(x + w/3 - 4, y - h/4, 4, 6);

            // Eyes
            ctx.fillStyle = COLORS.red;
            ctx.fillRect(x - 6, y - 6, 4, 4);
            ctx.fillRect(x + 2, y - 6, 4, 4);
        }

        // Health indicator for butterflies
        if (enemy.type === 'BUTTERFLY' && enemy.health < enemy.maxHealth) {
            ctx.fillStyle = COLORS.red;
            ctx.fillRect(x - 12, y - h/2 - 6, 24 * (enemy.health / enemy.maxHealth), 3);
        }
    }

    function drawEnemies() {
        for (let enemy of enemies) {
            drawEnemy(enemy);
        }
    }

    // ============================================
    // BULLETS
    // ============================================
    function updateBullets() {
        // Player bullets
        for (let i = playerBullets.length - 1; i >= 0; i--) {
            const bullet = playerBullets[i];
            bullet.y -= bullet.speed;
            
            if (bullet.y < -20) {
                playerBullets.splice(i, 1);
                continue;
            }

            // Check collision with enemies
            for (let j = enemies.length - 1; j >= 0; j--) {
                const enemy = enemies[j];
                if (checkCollision(bullet, enemy)) {
                    enemy.health--;
                    playerBullets.splice(i, 1);
                    
                    if (enemy.health <= 0) {
                        score += enemy.score;
                        createExplosion(enemy.x, enemy.y, enemy.color);
                        enemies.splice(j, 1);
                    } else {
                        createExplosion(enemy.x, enemy.y, COLORS.yellow, 5);
                    }
                    break;
                }
            }
        }

        // Enemy bullets
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            const bullet = enemyBullets[i];
            bullet.y += bullet.speed;

            if (bullet.y > HEIGHT + 20) {
                enemyBullets.splice(i, 1);
                continue;
            }

            // Check collision with player
            if (player.invincible <= 0 && checkCollision(bullet, player)) {
                playerHit();
                enemyBullets.splice(i, 1);
            }
        }
    }

    function drawBullets() {
        // Player bullets
        ctx.fillStyle = COLORS.cyan;
        for (let bullet of playerBullets) {
            ctx.fillRect(bullet.x - bullet.width/2, bullet.y - bullet.height/2, bullet.width, bullet.height);
            // Glow effect
            ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.fillRect(bullet.x - bullet.width, bullet.y - bullet.height/2, bullet.width * 2, bullet.height);
            ctx.fillStyle = COLORS.cyan;
        }

        // Enemy bullets
        ctx.fillStyle = COLORS.red;
        for (let bullet of enemyBullets) {
            ctx.fillRect(bullet.x - bullet.width/2, bullet.y - bullet.height/2, bullet.width, bullet.height);
            // Glow effect
            ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
            ctx.fillRect(bullet.x - bullet.width, bullet.y - bullet.height/2, bullet.width * 2, bullet.height);
            ctx.fillStyle = COLORS.red;
        }
    }

    // ============================================
    // COLLISION DETECTION
    // ============================================
    function checkCollision(a, b) {
        return Math.abs(a.x - b.x) < (a.width + b.width) / 2 &&
               Math.abs(a.y - b.y) < (a.height + b.height) / 2;
    }

    // ============================================
    // PARTICLES & EXPLOSIONS
    // ============================================
    function createExplosion(x, y, color, count = 15) {
        for (let i = 0; i < count; i++) {
            const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
            const speed = 2 + Math.random() * 4;
            particles.push({
                x: x,
                y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: 3 + Math.random() * 4,
                color: color,
                life: 1
            });
        }
    }

    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            p.size *= 0.97;

            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }
    }

    function drawParticles() {
        for (let p of particles) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
        }
        ctx.globalAlpha = 1;
    }

    // ============================================
    // PLAYER HIT
    // ============================================
    function playerHit() {
        lives--;
        screenShake = 15;
        player.invincible = 180;
        createExplosion(player.x, player.y, COLORS.cyan, 25);

        if (lives <= 0) {
            gameState = STATE.GAME_OVER;
            if (score > highScore) highScore = score;
        }
    }

    // ============================================
    // UI DRAWING
    // ============================================
    function drawUI() {
        ctx.fillStyle = COLORS.neonGreen;
        ctx.font = '16px "Courier New"';
        
        // Score
        ctx.textAlign = 'left';
        ctx.fillText(`SCORE: ${score}`, 20, 30);
        
        // High Score
        ctx.textAlign = 'center';
        ctx.fillText(`HI-SCORE: ${highScore}`, WIDTH/2, 30);
        
        // Lives
        ctx.textAlign = 'right';
        ctx.fillText(`LIVES: ${lives}`, WIDTH - 20, 30);
        
        // Wave
        ctx.textAlign = 'center';
        ctx.fillText(`WAVE ${wave}`, WIDTH/2, HEIGHT - 20);
    }

    function drawStartScreen() {
        ctx.fillStyle = COLORS.neonGreen;
        ctx.textAlign = 'center';
        
        // Title
        ctx.font = 'bold 48px "Courier New"';
        ctx.fillText('GALAGA', WIDTH/2, HEIGHT/3);
        
        ctx.font = '24px "Courier New"';
        ctx.fillText('CLONE', WIDTH/2, HEIGHT/3 + 40);
        
        // Blinking start text
        if (Math.floor(gameTime * 2) % 2 === 0) {
            ctx.font = '20px "Courier New"';
            ctx.fillText('PRESS SPACE TO START', WIDTH/2, HEIGHT/2 + 60);
        }
        
        // Controls
        ctx.font = '14px "Courier New"';
        ctx.fillStyle = COLORS.neonGreenDim;
        ctx.fillText('CONTROLS:', WIDTH/2, HEIGHT/2 + 120);
        ctx.fillText('ARROW KEYS or A/D - MOVE', WIDTH/2, HEIGHT/2 + 145);
        ctx.fillText('SPACE - SHOOT', WIDTH/2, HEIGHT/2 + 165);
        
        // High score
        ctx.fillStyle = COLORS.yellow;
        ctx.fillText(`HI-SCORE: ${highScore}`, WIDTH/2, HEIGHT/2 + 210);
    }

    function drawGameOver() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        
        ctx.fillStyle = COLORS.red;
        ctx.textAlign = 'center';
        ctx.font = 'bold 36px "Courier New"';
        ctx.fillText('GAME OVER', WIDTH/2, HEIGHT/3);
        
        ctx.fillStyle = COLORS.neonGreen;
        ctx.font = '24px "Courier New"';
        ctx.fillText(`FINAL SCORE: ${score}`, WIDTH/2, HEIGHT/2);
        
        if (score >= highScore && score > 0) {
            ctx.fillStyle = COLORS.yellow;
            ctx.fillText('NEW HIGH SCORE!', WIDTH/2, HEIGHT/2 + 40);
        }
        
        ctx.fillStyle = COLORS.neonGreenDim;
        ctx.font = '18px "Courier New"';
        if (Math.floor(gameTime * 2) % 2 === 0) {
            ctx.fillText('PRESS SPACE TO RESTART', WIDTH/2, HEIGHT/2 + 100);
        }
    }

    function drawWaveClear() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        
        ctx.fillStyle = COLORS.cyan;
        ctx.textAlign = 'center';
        ctx.font = 'bold 32px "Courier New"';
        ctx.fillText(`WAVE ${wave} CLEAR!`, WIDTH/2, HEIGHT/3);
        
        ctx.fillStyle = COLORS.neonGreen;
        ctx.font = '20px "Courier New"';
        ctx.fillText(`SCORE: ${score}`, WIDTH/2, HEIGHT/2);
        
        ctx.fillStyle = COLORS.yellow;
        ctx.font = '18px "Courier New"';
        ctx.fillText('GET READY FOR NEXT WAVE...', WIDTH/2, HEIGHT/2 + 60);
    }

    // ============================================
    // CRT EFFECTS
    // ============================================
    function drawCRTEffect() {
        // Scanlines
        crtCtx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        for (let y = 0; y < HEIGHT; y += 4) {
            crtCtx.fillRect(0, y, WIDTH, 2);
        }
        
        // Screen curvature vignette
        const gradient = crtCtx.createRadialGradient(
            WIDTH/2, HEIGHT/2, HEIGHT/3,
            WIDTH/2, HEIGHT/2, HEIGHT
        );
        gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0.4)');
        crtCtx.fillStyle = gradient;
        crtCtx.fillRect(0, 0, WIDTH, HEIGHT);
        
        // Subtle glow
        crtCtx.strokeStyle = 'rgba(0, 255, 0, 0.03)';
        crtCtx.lineWidth = 10;
        crtCtx.strokeRect(2, 2, WIDTH - 4, HEIGHT - 4);
    }

    // ============================================
    // GAME LOGIC
    // ============================================
    function resetGame() {
        score = 0;
        lives = 3;
        wave = 1;
        enemies = [];
        playerBullets = [];
        enemyBullets = [];
        particles = [];
        player.x = WIDTH / 2;
        player.y = HEIGHT - 60;
        player.invincible = 0;
        player.shootCooldown = 0;
        spawnWave();
    }

    function startNextWave() {
        wave++;
        enemies = [];
        playerBullets = [];
        enemyBullets = [];
        spawnWave();
        waveTimer = 0;
    }

    function update() {
        gameTime += 0.016;
        
        updateStars();

        if (gameState === STATE.PLAYING) {
            updatePlayer();
            updateEnemies();
            updateBullets();
            updateParticles();
            
            // Check wave clear
            if (enemies.length === 0 && waveTimer === 0) {
                waveTimer = 1;
                gameState = STATE.WAVE_CLEAR;
            }
            
            // Screen shake decay
            if (screenShake > 0) screenShake *= 0.9;
        } else {
            updateParticles();
        }
    }

    function draw() {
        // Clear with screen shake
        ctx.save();
        if (screenShake > 0.5) {
            ctx.translate(
                (Math.random() - 0.5) * screenShake,
                (Math.random() - 0.5) * screenShake
            );
        }

        // Background
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        // Stars
        drawStars();

        if (gameState === STATE.START_SCREEN) {
            drawStartScreen();
        } else if (gameState === STATE.PLAYING) {
            drawEnemies();
            drawPlayer();
            drawBullets();
            drawParticles();
            drawUI();
        } else if (gameState === STATE.GAME_OVER) {
            drawEnemies();
            drawBullets();
            drawParticles();
            drawUI();
            drawGameOver();
        } else if (gameState === STATE.WAVE_CLEAR) {
            drawEnemies();
            drawPlayer();
            drawParticles();
            drawUI();
            drawWaveClear();
            
            waveTimer++;
            if (waveTimer > 180) {
                startNextWave();
                gameState = STATE.PLAYING;
            }
        }

        ctx.restore();

        // CRT effect (after restore to not affect shake)
        drawCRTEffect();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // ============================================
    // INPUT HANDLING
    // ============================================
    document.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        
        if (e.code === 'Space') {
            e.preventDefault();
            
            if (gameState === STATE.START_SCREEN) {
                resetGame();
                gameState = STATE.PLAYING;
            } else if (gameState === STATE.GAME_OVER) {
                resetGame();
                gameState = STATE.PLAYING;
            }
        }
    });

    document.addEventListener('keyup', (e) => {
        keys[e.code] = false;
    });

    // ============================================
    // INITIALIZATION
    // ============================================
    initStars();
    gameLoop();

    </script>
</body>
</html>
